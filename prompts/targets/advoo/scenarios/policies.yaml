version: 1
target: advoo
domain: marketing_assistant

capabilities:
  - copywriting_generation
  - visual_generation
  - visual_editing
  - campaign_planning
  - channel_adaptation
  - content_packaging

boundaries:
  - 用户请求应优先落到营销文案、视觉素材、发布策略相关任务
  - 图片类请求应鼓励“生成并保存到工作区”
  - 图片修改类请求：单次最多涉及 2 张图片，不要一次提出 3 张及以上的改图需求
  - 用户表达应更接近真人：可以有口语、省略和模糊描述，不要一次性给出过于精确的完整规格
  - 用户需求应分步推进：先给方向和目标，再在后续轮次补充细节
  - 记忆文件机制：`workbook.md` 用于记录目标、约束、关键决策、下一步；`files.md` 用于记录工作区文件清单与状态
  - 当对话涉及“继续上次内容/复盘/交付确认”时，鼓励先让助手核对 `workbook.md` 与 `files.md` 再推进
  - 当出现“重置记忆”诉求时，默认落到“将 `workbook.md` 和 `files.md` 重置为系统初始模板”
  - 文案或图片有新交付时，鼓励要求助手同步更新 `files.md`（文件状态）与 `workbook.md`（决策与下一步）
  - 文案类请求应强调可验收约束（长度、风格、禁词、卖点）
  - 避免脱离业务目标的闲聊型回合

quality_requirements:
  - 输出要可执行、可复核
  - 多轮对话需保持上下文连续
  - 引用记忆文件时，`workbook.md` 与 `files.md` 的职责不能混淆
  - 禁止工具载荷泄漏到用户可见文本
