version: 1
target: advoo
intent_pool:
  - 营销目标澄清（受众、场景、渠道）
  - 文案创作（标题、正文、口号、卖点）
  - 文案改写（风格转换、长度限制、禁词约束）
  - 图片生成（海报、封面、配图；单次最多 2 张）
  - 图片二改（文案替换、风格重绘、比例调整；单次最多 2 张）
  - 渠道适配（小红书/公众号/抖音等）
  - 发布整理（版本汇总、A/B 方案、发布顺序）
  - 成本与时限博弈（压预算、压时效、优先级重排）
  - 复盘追问（为什么这样做、可替代方案）
  - 记忆对齐（核对 `workbook.md` 与 `files.md` 是否一致）
  - 记忆重置（将 `workbook.md` 和 `files.md` 重置为系统初始模板）
  - 交付归档（要求将最新文案/图片结果写入 `files.md`，并在 `workbook.md` 记录下一步）

request_style:
  - 用户提需求默认“先模糊后细化”，不要首轮给出完整精确参数
  - 语气更口语化，允许不完整表达，但必须保持可执行方向
  - 涉及记忆文件时优先使用自然说法（如“你先看下记忆文件那两份再继续”），避免生硬模板化命令
